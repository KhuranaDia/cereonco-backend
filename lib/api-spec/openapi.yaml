openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.5.0
  description: CereOnco Community API — Phase 1-5
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication
  - name: users
    description: User profile
  - name: posts
    description: Posts, likes, bookmarks
  - name: comments
    description: Comments and replies
  - name: groups
    description: Community groups, membership, group posts
  - name: notifications
    description: User notifications
  - name: messages
    description: >
      Direct (1:1) messaging between users. These REST endpoints are the durable
      source of truth (history, unread counts, mark-read). Real-time delivery,
      typing indicators and presence run over **Socket.IO** on the same server.


      **Socket connection**


      Connect to the same origin with path `/api/socket.io` and authenticate with
      the same JWT used for REST. Pass the token in the handshake:
      `io(ORIGIN, { path: "/api/socket.io", auth: { token: "<JWT>" } })`.
      An invalid/missing token rejects the connection. Sending a message over a
      socket persists it to the database first, then emits — so socket and REST
      stay consistent.


      **Client → Server events** (each accepts an optional ack callback):

      - `joinConversation { conversationId }` — join a chat room (membership-checked)

      - `leaveConversation { conversationId }`

      - `sendMessage { conversationId, content, mediaUrls? }` — persist + fan out

      - `markRead { conversationId }` — mark received messages read

      - `typingStart { conversationId }` / `typingStop { conversationId }`


      **Server → Client events:**

      - `newMessage` (Message) — to everyone in the conversation room

      - `messageReceived` (Message) — to the recipient's personal room (inbox badge)

      - `messageRead { conversationId, readerId, messageIds }` — read receipts

      - `typing { conversationId, userId }` / `stopTyping { conversationId, userId }`

      - `userOnline { userId }` / `userOffline { userId }` — presence

      - `onlineUsers { userIds }` — presence snapshot sent on connect

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    UserRole:
      type: string
      enum: [patient, caregiver, medical_professional, admin]

    VerificationStatus:
      type: string
      enum: [none, pending, approved, rejected]

    User:
      type: object
      required: [id, name, email, role, emailVerified, onboardingCompleted, verificationStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        countryCode:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        bio:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        profilePhotoUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
        cancerType:
          type: ["string", "null"]
        treatmentStage:
          type: ["string", "null"]
        interests:
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        specialty:
          type: ["string", "null"]
        hospitalAffiliation:
          type: ["string", "null"]
        medicalLicenseNumber:
          type: ["string", "null"]
        verificationStatus:
          $ref: "#/components/schemas/VerificationStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RegisterResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: JWT issued immediately on registration — the user is logged in.
        setupToken:
          type: string
          description: >-
            Password-setup token. Returned ONLY in non-production
            (NODE_ENV !== 'production') for testing convenience. In production
            the token is delivered via the emailed setup link only.

    Post:
      type: object
      required: [id, userId, content, feeling, mediaUrls, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        groupId:
          type: ["integer", "null"]
        content:
          type: string
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        mediaUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostAuthor:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: ["string", "null"]

    FeedPost:
      type: object
      required: [id, userId, content, feeling, mediaUrls, createdAt, updatedAt, author, likeCount, bookmarkCount, commentCount, isLiked, isBookmarked]
      properties:
        id:
          type: integer
        userId:
          type: integer
        groupId:
          type: ["integer", "null"]
        content:
          type: string
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        mediaUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
        likeCount:
          type: integer
        bookmarkCount:
          type: integer
        commentCount:
          type: integer
        isLiked:
          type: boolean
        isBookmarked:
          type: boolean

    LikeToggle:
      type: object
      required: [liked, likeCount]
      properties:
        liked:
          type: boolean
        likeCount:
          type: integer

    BookmarkToggle:
      type: object
      required: [bookmarked]
      properties:
        bookmarked:
          type: boolean

    # Comment schemas
    CommentAuthor:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: ["string", "null"]

    CommentReply:
      type: object
      required: [id, postId, userId, content, parentCommentId, isDeleted, createdAt, updatedAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        userId:
          type: ["integer", "null"]
        content:
          type: string
          description: "[deleted] when isDeleted is true"
        parentCommentId:
          type: integer
        isDeleted:
          type: boolean
        mentionedUserId:
          type: ["integer", "null"]
        mentionedUserName:
          type: ["string", "null"]
          description: Name of the mentioned user (joined from users), or null.
        author:
          oneOf:
            - $ref: "#/components/schemas/CommentAuthor"
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      required: [id, postId, userId, content, isDeleted, createdAt, updatedAt, replyCount]
      properties:
        id:
          type: integer
        postId:
          type: integer
        userId:
          type: ["integer", "null"]
        content:
          type: string
          description: "[deleted] when isDeleted is true"
        parentCommentId:
          type: ["integer", "null"]
        isDeleted:
          type: boolean
        mentionedUserId:
          type: ["integer", "null"]
        mentionedUserName:
          type: ["string", "null"]
          description: Name of the mentioned user (joined from users), or null.
        author:
          oneOf:
            - $ref: "#/components/schemas/CommentAuthor"
            - type: "null"
        replyCount:
          type: integer
        replies:
          type: array
          items:
            $ref: "#/components/schemas/CommentReply"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommentsListResponse:
      type: object
      required: [comments, total]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        total:
          type: integer

    # Body schemas — entity-shaped names to avoid TS2308 collisions
    UserRegisterInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        country_code:
          type: string
        phone_number:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        specialty:
          type: string

    SetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
          description: >-
            The single-use token from the password setup/reset email. May be
            sent as the raw token (e.g. `abc123...`) OR as the complete link the
            user received (e.g. `http://localhost:5173/reset-password?token=abc123...`)
            or a bare query fragment (`?token=abc123...`); the server extracts,
            URL-decodes, and trims the `token` value automatically.
        password:
          type: string
          minLength: 6
          description: The new password (min 6 characters).

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    GoogleAuthInput:
      type: object
      description: >-
        Frontend-trusted Google profile payload. `sub` (the Google subject id)
        is the only required field; `email` is optional because some Google
        payloads omit it. SECURITY: production should verify a Google ID token
        server-side rather than trusting a raw profile from the client.
      required: [sub]
      properties:
        sub:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        given_name:
          type: ["string", "null"]
        family_name:
          type: ["string", "null"]
        nickname:
          type: ["string", "null"]
        picture:
          type: ["string", "null"]

    TestEmailInput:
      type: object
      required: [to]
      properties:
        to:
          type: string
          format: email

    TestEmailResult:
      type: object
      required: [messageId, accepted, rejected, response]
      properties:
        messageId:
          type: string
        accepted:
          type: array
          items:
            type: string
        rejected:
          type: array
          items:
            type: string
        response:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        bio:
          type: string
        location:
          type: string
        avatarUrl:
          type: string
        profilePhotoUrl:
          type: string
        imageUrl:
          type: string
        onboardingCompleted:
          type: boolean
        cancerType:
          type: string
        treatmentStage:
          type: string
        interests:
          type: array
          items:
            type: string
        specialty:
          type: string
        hospitalAffiliation:
          type: string
        medicalLicenseNumber:
          type: string

    UserSearchResult:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: ["string", "null"]
        profilePhotoUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    UserSearchResponse:
      type: object
      required: [users, total]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSearchResult"
        total:
          type: integer

    SeedSystemNotificationsResponse:
      type: object
      required: [created]
      properties:
        created:
          type: integer
          description: Number of system notifications created (0 if they already existed).

    PostInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        feeling:
          type: ["string", "null"]
        groupId:
          type: ["integer", "null"]
          description: When set, the post is scoped to the given group; null/omitted for a regular feed post.
        imageUrl:
          type: string
        mediaUrls:
          type: array
          items:
            type: string

    PostUpdate:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: string
        mediaUrls:
          type: array
          items:
            type: string

    CommentInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        parentCommentId:
          type: integer
        mentionedUserId:
          type: integer
          description: Optional id of a user mentioned in this comment. When set, a mention notification is created for that user.

    CommentUpdate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # Group schemas
    Group:
      type: object
      required: [id, name, description, category, creatorUserId, memberCount, isMember, isAdmin, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        tagline:
          type: ["string", "null"]
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        creatorUserId:
          type: ["integer", "null"]
          description: ID of the user who created/owns the group (its admin). Null only for legacy rows with no recorded creator.
        memberCount:
          type: integer
        isMember:
          type: boolean
        isAdmin:
          type: boolean
          description: True when the current authenticated user is the group's creator/admin.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GroupsListResponse:
      type: object
      required: [groups, total]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
        total:
          type: integer

    CreateGroupInput:
      type: object
      required: [name, description, category]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        tagline:
          type: ["string", "null"]
        category:
          type: string
          minLength: 1
        imageUrl:
          type: ["string", "null"]

    GroupPost:
      type: object
      description: >-
        A group post is a row in the shared posts table with a non-null groupId.
        It carries the same shape as a main-feed post (counts, media, feeling,
        author, like/bookmark state).
      required:
        [id, groupId, userId, content, feeling, mediaUrls, createdAt, updatedAt, author, likeCount, bookmarkCount, commentCount, isLiked, isBookmarked]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        userId:
          type: integer
        content:
          type: string
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        mediaUrls:
          type: array
          items:
            type: string
        author:
          $ref: "#/components/schemas/PostAuthor"
        likeCount:
          type: integer
        bookmarkCount:
          type: integer
        commentCount:
          type: integer
        isLiked:
          type: boolean
        isBookmarked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GroupPostsListResponse:
      type: object
      required: [posts, total]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/GroupPost"
        total:
          type: integer

    GroupPostInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: string
        mediaUrls:
          type: array
          items:
            type: string

    GroupPostUpdate:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        feeling:
          type: ["string", "null"]
        imageUrl:
          type: string
        mediaUrls:
          type: array
          items:
            type: string

    MembershipToggle:
      type: object
      required: [joined, memberCount]
      properties:
        joined:
          type: boolean
        memberCount:
          type: integer

    # Notification schemas
    NotificationType:
      type: string
      enum:
        - post_liked
        - post_commented
        - comment_replied
        - group_joined
        - group_post_created
        - verification_updated
        - mention
        - system

    EntityType:
      type: string
      enum: [post, comment, group, group_post, user, event]

    NotificationActor:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        profilePhotoUrl:
          type: ["string", "null"]

    Notification:
      type: object
      required: [id, type, entityType, entityId, message, isRead, actor, createdAt, updatedAt]
      properties:
        id:
          type: integer
        type:
          $ref: "#/components/schemas/NotificationType"
        entityType:
          $ref: "#/components/schemas/EntityType"
        entityId:
          type: integer
        message:
          type: string
        isRead:
          type: boolean
        actor:
          $ref: "#/components/schemas/NotificationActor"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationsListResponse:
      type: object
      required: [notifications, total, unreadCount]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        total:
          type: integer
        unreadCount:
          type: integer

    UnreadCountResponse:
      type: object
      required: [unreadCount]
      properties:
        unreadCount:
          type: integer

    # Message schemas
    ConversationParticipant:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: ["string", "null"]
        profilePhotoUrl:
          type: ["string", "null"]

    Message:
      type: object
      required: [id, conversationId, senderId, receiverId, content, mediaUrls, isRead, createdAt, updatedAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        receiverId:
          type: integer
        content:
          type: string
        mediaUrls:
          type: array
          items:
            type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Conversation:
      type: object
      required: [id, participant, lastMessage, unreadCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        participant:
          $ref: "#/components/schemas/ConversationParticipant"
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - type: "null"
        unreadCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationListResponse:
      type: object
      required: [conversations, total]
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        total:
          type: integer

    MessagesListResponse:
      type: object
      required: [messages, total]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        total:
          type: integer

    CreateConversationInput:
      type: object
      required: [recipientId]
      properties:
        recipientId:
          type: integer

    SendMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        mediaUrls:
          type: array
          items:
            type: string

    UnreadMessagesCountResponse:
      type: object
      required: [unreadCount]
      properties:
        unreadCount:
          type: integer

    # Event schemas
    RsvpStatus:
      type: string
      enum: [going, interested, not_going]

    EventCreator:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatarUrl:
          type: ["string", "null"]

    Event:
      type: object
      required: [id, title, eventDate, createdBy, creator, rsvpCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        eventDate:
          type: string
          format: date-time
        location:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdBy:
          type: integer
        creator:
          $ref: "#/components/schemas/EventCreator"
        rsvpCount:
          type: integer
        myRsvpStatus:
          oneOf:
            - $ref: "#/components/schemas/RsvpStatus"
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventsListResponse:
      type: object
      required: [events, total]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer

    EventInput:
      type: object
      required: [title, eventDate]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        eventDate:
          type: string
          format: date-time
        location:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    EventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        eventDate:
          type: string
          format: date-time
        location:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    EventRsvpInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/RsvpStatus"

    RsvpResponse:
      type: object
      required: [rsvpCount, myRsvpStatus]
      properties:
        rsvpCount:
          type: integer
        myRsvpStatus:
          oneOf:
            - $ref: "#/components/schemas/RsvpStatus"
            - type: "null"

    DeleteResponse:
      type: object
      description: Standard envelope for resource deletions.
      properties: {}

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterInput"
      responses:
        "201":
          description: Registered; password-setup email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
        "409":
          description: Email already in use

  /auth/set-password:
    post:
      operationId: setPassword
      tags: [auth]
      summary: Set or reset password via a setup/reset token
      description: >-
        Completes passwordless registration AND finishes the forgot-password
        reset flow (both flows mint the same kind of single-use token). Accepts
        a payload of `{ token, password }`. The `token` may be the raw token OR
        the complete reset/setup URL the user received (e.g.
        `http://localhost:5173/reset-password?token=abc123...`) — the server
        extracts, URL-decodes, and trims the `token` value automatically, so a
        frontend can safely forward the whole link. On success the account is
        verified, the token is consumed (it can never be used again), and a
        normal login response (`{ token, user }`) is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordInput"
      responses:
        "200":
          description: >-
            Password updated; account verified and logged in. Returns the same
            `{ token, user }` envelope as login with the message
            "Password updated successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: >-
            Validation failed, the token is invalid ("Invalid password reset
            token."), or the link was already used ("This reset link has already
            been used.").
        "410":
          description: The reset link has expired ("Reset link has expired.").

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset link (reuses the set-password token flow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: >-
            Always returns success when the request is well-formed, even if no
            account matches the email, to avoid leaking which emails are
            registered. A reset link is emailed (or logged) only when a user
            exists. The link host is resolved dynamically: the request `Origin`
            header is used first, but only when it matches an allowlisted origin
            (`FRONTEND_URL` / `TEST_FRONTEND_URL` / `ALLOWED_FRONTEND_ORIGINS` /
            the localhost dev default); otherwise it falls back to `FRONTEND_URL`,
            then `TEST_FRONTEND_URL`, then `http://localhost:5173`. Reset links
            point at `/reset-password?token=...`. Only the `Origin` header is ever
            consulted from the request (never request-body values), and a
            non-allowlisted Origin cannot override the link host.
        "400":
          description: Validation error

  /auth/google:
    post:
      operationId: googleAuth
      tags: [auth]
      summary: Log in or register with a Google profile (frontend-trusted)
      description: >-
        Accepts a Google profile from the frontend. Looks up the user by email
        (when present) then by Google `sub`; creates the account if none exists.
        Returns the same auth payload as login. SECURITY: this trusts the
        client-supplied profile — production should verify a Google ID token
        server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthInput"
      responses:
        "200":
          description: Logged in (existing user)
