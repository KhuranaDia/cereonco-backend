  # ── Groups ────────────────────────────────────────────────────────────────

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List the current user's groups
      description: >-
        Returns only groups where the authenticated user is the creator/admin
        OR a member. Each item includes creatorUserId, isAdmin, isMember and
        memberCount (count of all members). Unrelated groups are not returned.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupsListResponse"
        "401":
          description: Unauthorized
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a community group (JSON or multipart image upload)
      description: >
        Accepts application/json or multipart/form-data with an optional `image`
        file (jpg/jpeg/png/webp, max 20MB) plus the text fields name,
        description, category, and optional tagline. An uploaded image's stored
        URL is saved into the group's imageUrl and takes precedence over any
        imageUrl sent in the body.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: >-
            Validation failed. `message` is a single, human-readable,
            field-level explanation (never a raw Zod array or "Required").
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                required: [success, message]
              examples:
                missingName:
                  value:
                    success: false
                    message: "Group name is required. Please enter a group name."
                invalidCategory:
                  value:
                    success: false
                    message: "Category is invalid. Please select a valid category."
                invalidImageUrl:
                  value:
                    success: false
                    message: "Image URL must be a valid URL, e.g. https://example.com/image.png."
        "401":
          description: Unauthorized

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a single group with membership info
      security:
